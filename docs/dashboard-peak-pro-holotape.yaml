# Peak Pro — Pip-Boy terminal
# Requires helper: input_select.peak_pro_profile_view (see dashboard-peak-pro-helpers.yaml)
# P1–P4 chips = instant UI (no BLE). Climate card = device temp/profile (always °C from integration).
# Entity prefix: peak_pro_00059_0c_43_14_b7_91_9c

title: Peak Pro
path: peak-pro-holotape
type: panel
theme: Pip-Boy
cards:
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          ## ROBCO TERMLINK v1.3.0 // VAPORIZATION_OVERSEER
          PEAK PRO 00059 · OFFICE · ALL TEMPS °C

      - type: custom:mushroom-template-card
        entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_operating_state
        primary: >-
          {% set s = states(entity) %}
          {% if s in ['heat_cycle_preheat', 'heat_cycle_active', 'heat_cycle_fade'] %}
          {% set r = states('sensor.peak_pro_00059_0c_43_14_b7_91_9c_heat_time_remaining') | float(0) | int %}
          {{ '%02d:%02d' | format(r // 60, r % 60) }}
          {% else %}
          {{ s | replace('_', ' ') | upper }}
          {% endif %}
        secondary: >-
          {% set s = states(entity) %}
          {% set tc = states('sensor.peak_pro_00059_0c_43_14_b7_91_9c_heater_temperature') | float(0) | round(0) %}
          {% if s == 'heat_cycle_preheat' %}PREHEAT · {{ tc }} °C
          {% elif s == 'heat_cycle_active' %}HEATING · {{ tc }} °C
          {% elif s == 'heat_cycle_fade' %}COOL-DOWN · {{ tc }} °C
          {% else %}
          {{ tc }} °C · {{ state_attr('climate.peak_pro_00059_0c_43_14_b7_91_9c_heater', 'preset_mode') or 'Profile 1' }} active
          {% endif %}
        icon: >-
          {% set s = states(entity) %}
          {% if s == 'heat_cycle_active' %}mdi:radioactive
          {% elif s in ['heat_cycle_preheat', 'heat_cycle_fade'] %}mdi:fire
          {% else %}mdi:flask-outline{% endif %}
        icon_color: >-
          {% set s = states(entity) %}
          {% if s == 'heat_cycle_active' %}red
          {% elif s == 'heat_cycle_preheat' %}orange
          {% elif s == 'heat_cycle_fade' %}amber
          {% else %}green{% endif %}

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: ''
            secondary: IGNITE
            icon: mdi:fire
            icon_color: red
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.peak_pro_00059_0c_43_14_b7_91_9c_start_session
          - type: custom:mushroom-template-card
            entity: switch.peak_pro_00059_0c_43_14_b7_91_9c_heat_session
            primary: ''
            secondary: HEAT
            icon: mdi:fire-circle
            icon_color: '{{ ''red'' if is_state(entity, ''on'') else ''disabled'' }}'
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            entity: switch.peak_pro_00059_0c_43_14_b7_91_9c_stealth_mode
            primary: ''
            secondary: STEALTH
            icon: mdi:eye-off
            icon_color: '{{ ''green'' if is_state(entity, ''on'') else ''disabled'' }}'
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            primary: ''
            secondary: LINK
            icon: mdi:bluetooth-connect
            icon_color: blue
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.peak_pro_00059_0c_43_14_b7_91_9c_reconnect

      - type: thermostat
        entity: climate.peak_pro_00059_0c_43_14_b7_91_9c_heater
        name: Heater (°C)

      - type: custom:apexcharts-card
        header:
          show: true
          title: CHAMBER_THERMAL.EXE (°C)
          show_states: true
          colorize_states: true
        graph_span: 1h
        apex_config:
          chart:
            height: 120
          grid:
            show: false
          stroke:
            width: 3
            curve: smooth
          yaxis:
            decimalsInFloat: 0
            labels:
              formatter: |
                EVAL: (val) => Math.round(val) + "°C"
        series:
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_heater_temperature
            name: °C
            color: '#00ff66'
            type: area
            float_precision: 0

      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            content: P1
            icon: mdi:numeric-1-circle
            icon_color: >-
              {{ 'red' if is_state('input_select.peak_pro_profile_view', 'Profile 1') else 'green' }}
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              target:
                entity_id: input_select.peak_pro_profile_view
              data:
                option: Profile 1
          - type: template
            content: P2
            icon: mdi:numeric-2-circle
            icon_color: >-
              {{ 'red' if is_state('input_select.peak_pro_profile_view', 'Profile 2') else 'green' }}
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              target:
                entity_id: input_select.peak_pro_profile_view
              data:
                option: Profile 2
          - type: template
            content: P3
            icon: mdi:numeric-3-circle
            icon_color: >-
              {{ 'red' if is_state('input_select.peak_pro_profile_view', 'Profile 3') else 'green' }}
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              target:
                entity_id: input_select.peak_pro_profile_view
              data:
                option: Profile 3
          - type: template
            content: P4
            icon: mdi:numeric-4-circle
            icon_color: >-
              {{ 'red' if is_state('input_select.peak_pro_profile_view', 'Profile 4') else 'green' }}
            tap_action:
              action: perform-action
              perform_action: input_select.select_option
              target:
                entity_id: input_select.peak_pro_profile_view
              data:
                option: Profile 4

      # CSS show/hide = instant (no conditional card destroy / no BLE on chip tap)
      - type: custom:mod-card
        card_mod:
          style: |
            {% if not is_state('input_select.peak_pro_profile_view', 'Profile 1') %}
            ha-card { display: none !important; }
            {% endif %}
        card:
          type: entities
          title: '=== [ PROFILE_1 LOADOUT ] ==='
          show_header_toggle: false
          entities:
            - entity: text.peak_pro_00059_0c_43_14_b7_91_9c_profile_1_name
              name: Name
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_1_temperature
              name: Temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_1_duration
              name: Duration (s)
            - entity: light.peak_pro_00059_0c_43_14_b7_91_9c_profile_1_color
              name: Accent color
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_1_boost_temperature
              name: Boost temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_1_boost_duration
              name: Boost time (s)

      - type: custom:mod-card
        card_mod:
          style: |
            {% if not is_state('input_select.peak_pro_profile_view', 'Profile 2') %}
            ha-card { display: none !important; }
            {% endif %}
        card:
          type: entities
          title: '=== [ PROFILE_2 LOADOUT ] ==='
          show_header_toggle: false
          entities:
            - entity: text.peak_pro_00059_0c_43_14_b7_91_9c_profile_2_name
              name: Name
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_2_temperature
              name: Temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_2_duration
              name: Duration (s)
            - entity: light.peak_pro_00059_0c_43_14_b7_91_9c_profile_2_color
              name: Accent color
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_2_boost_temperature
              name: Boost temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_2_boost_duration
              name: Boost time (s)

      - type: custom:mod-card
        card_mod:
          style: |
            {% if not is_state('input_select.peak_pro_profile_view', 'Profile 3') %}
            ha-card { display: none !important; }
            {% endif %}
        card:
          type: entities
          title: '=== [ PROFILE_3 LOADOUT ] ==='
          show_header_toggle: false
          entities:
            - entity: text.peak_pro_00059_0c_43_14_b7_91_9c_profile_3_name
              name: Name
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_3_temperature
              name: Temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_3_duration
              name: Duration (s)
            - entity: light.peak_pro_00059_0c_43_14_b7_91_9c_profile_3_color
              name: Accent color
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_3_boost_temperature
              name: Boost temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_3_boost_duration
              name: Boost time (s)

      - type: custom:mod-card
        card_mod:
          style: |
            {% if not is_state('input_select.peak_pro_profile_view', 'Profile 4') %}
            ha-card { display: none !important; }
            {% endif %}
        card:
          type: entities
          title: '=== [ PROFILE_4 LOADOUT ] ==='
          show_header_toggle: false
          entities:
            - entity: text.peak_pro_00059_0c_43_14_b7_91_9c_profile_4_name
              name: Name
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_4_temperature
              name: Temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_4_duration
              name: Duration (s)
            - entity: light.peak_pro_00059_0c_43_14_b7_91_9c_profile_4_color
              name: Accent color
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_4_boost_temperature
              name: Boost temp (°C)
            - entity: number.peak_pro_00059_0c_43_14_b7_91_9c_profile_4_boost_duration
              name: Boost time (s)

      - type: light
        entity: light.peak_pro_00059_0c_43_14_b7_91_9c_lantern
        name: Lantern

      - type: entities
        title: '=== [ ARCHIVE & DIAGNOSTICS (expand) ] ==='
        show_header_toggle: true
        state_color: true
        entities:
          - type: section
            label: DAB COUNTERS
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_total_dabs
            name: Lifetime
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_trip_dabs
            name: Trip
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_daily_dabs
            name: Daily avg
          - type: section
            label: SYSTEM
          - event.peak_pro_00059_0c_43_14_b7_91_9c_session
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_uptime
            name: Uptime
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_total_heat_time
            name: Total heat (s)
          - entity: sensor.peak_pro_00059_0c_43_14_b7_91_9c_device_birthday
