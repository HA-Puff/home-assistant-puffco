name: Sync repository metadata

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/metadata.json
      - .github/workflows/repo-metadata.yml

permissions:
  administration: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set repository description and topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          with open(".github/metadata.json", encoding="utf-8") as fh:
              meta = json.load(fh)

          subprocess.run(
              ["gh", "repo", "edit", os.environ["GITHUB_REPOSITORY"], "--description", meta["description"]],
              check=True,
          )

          args = ["gh", "api", "--method", "PUT", f"repos/{os.environ['GITHUB_REPOSITORY']}/topics"]
          for topic in meta["topics"]:
              args.extend(["-f", f"names[]={topic}"])
          subprocess.run(args, check=True)
          PY
