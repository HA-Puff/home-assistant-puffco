name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hacs:
    runs-on: ubuntu-latest
    permissions:
      administration: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Sync repository metadata for HACS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess

          with open(".github/metadata.json", encoding="utf-8") as fh:
              meta = json.load(fh)

          subprocess.run(
              ["gh", "repo", "edit", os.environ["GITHUB_REPOSITORY"], "--description", meta["description"]],
              check=True,
          )

          args = ["gh", "api", "--method", "PUT", f"repos/{os.environ['GITHUB_REPOSITORY']}/topics"]
          for topic in meta["topics"]:
              args.extend(["-f", f"names[]={topic}"])
          subprocess.run(args, check=True)
          PY
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  library-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install puffco-ble
        run: |
          pip install -e "./puffco-ble[dev]"
      - name: pytest
        run: pytest puffco-ble/tests -q --ignore=puffco-ble/tests/test_protocol.py
